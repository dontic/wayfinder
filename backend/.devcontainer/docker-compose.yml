# docker-compose.yml

name: wayfinder-backend

services:

  redis:
    image: redis:alpine
    restart: no
    networks:
      - devnet

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    restart: no
    environment:
      POSTGRES_USER: django
      POSTGRES_PASSWORD: django
    user: root
    ports:
      - "5432:5432"
    volumes:
      - postgresdata:/home/postgres/pgdata/data
    networks:
      - devnet

  django:
    build:
      context: ../ # Path to the project's root folder so that the Dockerfile commands can access the project
      dockerfile: ./.devcontainer/Dockerfile # Path to the Dockerfile
    volumes:
      # Update this to wherever you want VS Code to mount the folder of your project
      # Mount the root folder that contains .git
      - ../../:/workspaces:cached
    # Overrides default command so things don't shut down after the process ends.
    command: /bin/sh -c "while sleep 1000; do :; done"
    depends_on:
      - redis
      - timescaledb
    networks:
      - devnet

volumes:
  postgresdata:

networks:
  devnet:
    name: django-dev